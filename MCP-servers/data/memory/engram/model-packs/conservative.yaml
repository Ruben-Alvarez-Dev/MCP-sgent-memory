# Model Pack: conservative
# Maximum determinism. Use for production code, security-critical, or
# when every token must be exact.

name: conservative
description: "Maximum determinism for production and security-critical code"

roles:
  architect:
    temperature: 0.3
    purpose: "Conservative context selection — load more, miss less"
    max_tokens: 3000
    use_for:
      - classify_context_needs
      - rank_relevance

  planner:
    temperature: 0.5
    purpose: "Careful planning with minimal assumptions"
    max_tokens: 4000
    use_for:
      - create_plan
      - decompose_problem

  coder:
    temperature: 0.0
    purpose: "Fully deterministic code generation"
    max_tokens: 8000
    use_for:
      - implement_subtask
      - fix_bug
      - write_test

  validator:
    temperature: 0.0
    purpose: "Strict validation with zero hallucination tolerance"
    max_tokens: 2000
    use_for:
      - validate_syntax
      - check_compliance
      - review_diff

  summarizer:
    temperature: 0.2
    purpose: "Factual summaries only"
    max_tokens: 800
    use_for:
      - summarize_changes
      - write_commit_msg
