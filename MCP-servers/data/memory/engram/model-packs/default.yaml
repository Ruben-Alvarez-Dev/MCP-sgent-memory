# Model Pack: default
# Balanced configuration for general coding tasks.
# Each role has an optimized temperature for its purpose.

name: default
description: "Balanced model pack for general coding tasks"

roles:
  architect:
    temperature: 0.5
    purpose: "Context selection — decide what to load and rank relevance"
    max_tokens: 2000
    use_for:
      - classify_context_needs
      - rank_relevance
      - decide_file_loading

  planner:
    temperature: 0.7
    purpose: "Break tasks into subtasks, think creatively, evaluate approaches"
    max_tokens: 4000
    use_for:
      - create_plan
      - decompose_problem
      - evaluate_approaches

  coder:
    temperature: 0.1
    purpose: "Generate deterministic, precise code"
    max_tokens: 8000
    use_for:
      - implement_subtask
      - fix_bug
      - write_test
      - refactor_code

  validator:
    temperature: 0.1
    purpose: "Verify code correctness, syntax, compliance"
    max_tokens: 2000
    use_for:
      - validate_syntax
      - check_compliance
      - review_diff
      - verify_build

  summarizer:
    temperature: 0.3
    purpose: "Condense information without losing key details"
    max_tokens: 1000
    use_for:
      - summarize_changes
      - write_commit_msg
      - brief_status
      - name_things
