name: Mirror to Jart-OS

on:
  push:
    branches: [main]

jobs:
  mirror:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mirror to Jart-OS
        env:
          TOKEN: ${{ secrets.JART_OS_TOKEN }}
        run: |
          git push "https://Jart-OS:${TOKEN}@github.com/Jart-OS/MCP-memory-server.git" main --force
